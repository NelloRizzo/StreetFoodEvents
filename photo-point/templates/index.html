<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Point</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
  <header>
    <nav class="nav-bar">
      <a href="/" class="nav-link active">Scatta foto</a>
      <a href="/gallery" class="nav-link">Galleria</a>
    </nav>
    <h1>Photo Point</h1>
    <p class="status-bar">
      <span id="status-camera" class="badge">Camera: ...</span>
      <span id="status-printer" class="badge">Stampante: ...</span>
      <span id="status-email" class="badge">Email: ...</span>
    </p>
  </header>

  <div class="main-layout">
    <div class="preview-panel">
      <div class="preview-frame" id="preview-frame">
        <img id="preview-img" src="" alt="Anteprima foto" style="display:none">
        <div class="placeholder" id="placeholder">
          <span>Scatta una foto</span>
        </div>
      </div>
      <button class="btn btn-capture" id="btn-capture" onclick="capture()">Scatta foto</button>
    </div>

    <div class="controls-panel">
      <section class="panel-section">
        <h2>Cornice</h2>
        <div class="frame-selector" id="frame-selector">
          <div class="frame-option selected" data-frame-id="" onclick="selectFrame(this, '')">
            <div class="frame-thumb">Nessuna</div>
          </div>
        </div>
      </section>

      <section class="panel-section">
        <h2>Azioni</h2>
        <div class="actions">
          <button class="btn btn-print" id="btn-print" onclick="printPhoto()" disabled>Stampa</button>
          <button class="btn btn-email" id="btn-email" onclick="showEmailDialog()" disabled>Invia via email</button>
        </div>
        <div id="email-dialog" class="dialog" style="display:none">
          <input type="email" id="email-input" placeholder="Inserisci indirizzo email">
          <div class="dialog-actions">
            <button class="btn btn-sm" onclick="sendEmail()">Invia</button>
            <button class="btn btn-sm btn-secondary" onclick="hideEmailDialog()">Annulla</button>
          </div>
        </div>
        <p id="capture-message" class="message"></p>
      </section>

      <section class="panel-section" id="admin-section" style="display:none">
        <h2>Gestione cornici</h2>
        <div class="upload-area">
          <input type="file" id="frame-upload" accept=".png,.jpg,.jpeg">
          <button class="btn btn-sm" onclick="uploadFrame()">Carica cornice</button>
        </div>
      </section>
    </div>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
