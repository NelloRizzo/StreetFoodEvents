services:
  # --- Backend API ---
  - type: web
    name: streetfoodevents-api
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    ignoreCommand: >
      git diff --name-only HEAD~1 HEAD | grep -v '^AGENTS\.md$' | grep -q .
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '4000'
      - key: MONGODB_DB_NAME
        value: street-food-events
      - key: CLIENT_URL
        value: https://streetfoodevents.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # --- Frontend (SPA) ---
  - type: web
    name: streetfoodevents
    env: node
    region: frankfurt
    plan: free
    rootDir: frontend
    ignoreCommand: >
      git diff --name-only HEAD~1 HEAD | grep -v '^AGENTS\.md$' | grep -q .
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_BASE_URL
        value: /
      - key: VITE_API_URL
        value: https://streetfoodevents-api.onrender.com/api
      - key: VITE_GTM_ID
        sync: false
      - key: VITE_PRIVACY_EMAIL
        sync: false
